[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "misen"
version = "0.1.0"

authors = [
    { name = "Apoorv Khandelwal", email = "mail@apoorvkh.com" }
]
description = "DAG execution engine"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "dill>=0.4.0",
    "rustworkx>=0.15.0",
    "msgspec>=0.20.0",
    "tomli>=1.1.0 ; python_version < '3.11'",
    "tyro>=1.0.0",
    "flufl-lock>=8.2.0",
    "lmdb>=1.7.5",
    "misen_hash",
]
[dependency-groups]
dev = [
    "ruff==0.14.9",
    "ty==0.0.7",
    "pytest==8.3.3",
]
slurm = ["submitit>=1.5.0", "setuptools"]
docs = [
  "sphinx==7.4.7",
  "furo==2024.8.6",
  "myst-parser==3.0.1",
  "sphinx-toolbox==3.8.2",
]

[tool.uv.sources]
misen-hash = { workspace = true }

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 120
include = ["pyproject.toml", "src/**/*.py", "tests/**/*.py"]
src = ["src", "tests", "packages"]
[tool.ruff.lint]
extend-select = ["I", "TCH"]
[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ty.src]
include = ["src"]
