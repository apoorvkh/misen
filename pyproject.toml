[project]
name = "dango"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "apoorvkh", email = "mail@apoorvkh.com"},
]
dependencies = [
    "xxhash>=3.4.1",
    "ormsgpack>=1.5.0",
    "dill>=0.3.8",
]
requires-python = ">=3.10"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"


[tool.pdm]
distribution = true

[tool.pdm.dev-dependencies]
dev = [
    "ruff",
    "pyright",
    "pytest",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = ["I"]
