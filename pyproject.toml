[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "misen"
version = "0.1.0"

authors = [
    { name = "Apoorv Khandelwal", email = "mail@apoorvkh.com" },
    { name = "Peter Curtin", email = "peter_curtin@brown.edu" },
]
description = "DAG execution engine"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "xxhash>=3.0.0",
    "ormsgpack>=1.5.0",
    "dill>=0.3.6",
    "rustworkx>=0.15.0",
    "msgspec[toml]>=0.19.0",
]
[dependency-groups]
slurm = ["submitit>=1.5.0"]
dev = ["ruff==0.11.2", "pyright[nodejs]==1.1.397", "pytest==8.3.3"]

[tool.uv]
managed = true
python-preference = "only-managed"

[tool.ruff]
line-length = 100
include = ["pyproject.toml", "src/**/*.py", "tests/**/*.py"]
src = ["src", "tests"]
[tool.ruff.lint]
extend-select = ["I", "TCH"]
# select = ["ALL"]
# ignore = ["D"]
[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pyright]
include = ["src", "tests"]
pythonVersion = "3.10"
pythonPlatform = "Linux"
