[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "misen"
version = "0.1.0"

authors = [
    { name = "Apoorv Khandelwal", email = "mail@apoorvkh.com" },
    { name = "Peter Curtin", email = "peter_curtin@brown.edu" },
]
description = "DAG execution engine"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "dill>=0.3.6",
    "rustworkx>=0.15.0",
    "msgspec>=0.19.0",
    "tomli>=1.1.0 ; python_version < '3.11'",
    "tyro>=0.9.20",
    "misen_serialization"
]
[dependency-groups]
slurm = ["submitit>=1.5.0"]
dev = ["ruff==0.11.2", "pyright[nodejs]==1.1.400", "pytest==8.3.3", "ty"]

[tool.uv.sources]
misen-serialization = { workspace = true }

[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
line-length = 100
include = ["pyproject.toml", "src/**/*.py", "tests/**/*.py"]
src = ["src", "tests", "packages"]
[tool.ruff.lint]
extend-select = ["I", "TCH"]
[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pyright]
src = ["src", "tests", "packages"]
pythonVersion = "3.10"
pythonPlatform = "Linux"
