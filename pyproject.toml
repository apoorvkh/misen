[project]
name = "dango"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "apoorvkh", email = "mail@apoorvkh.com"},
]
dependencies = []
requires-python = ">=3.9"
readme = "README.md"
license = {text = "MIT"}

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"


[tool.pdm]
distribution = true

[tool.pdm.dev-dependencies]
dev = [
    "ruff",
    "pyright",
    "pytest",
]

[tool.ruff]
line-length = 100
